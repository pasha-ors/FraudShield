version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: fraudshield-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fraudshield
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7
    ports:
      - "6379:6379"


volumes:
  postgres_data: